; OnStepX online-build service
;
; One env per supported MCU family. The pinmap (MaxPCB4 / MaxESP4 / MaxSTM3 /
; FYSETC_E4 / etc.) is selected inside Config.h at build time — it only needs
; to be compatible with the MCU family chosen here.

[platformio]
src_dir = OnStepX
default_envs = esp32

[env]
framework = arduino
; Keep build output small/consistent
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -I OnStepX
monitor_speed = 9600

; -----------------------------------------------------------------------------
; ESP32 — covers MaxESP3, MaxESP4, generic ESP32 pinmaps
; -----------------------------------------------------------------------------
[env:esp32]
platform = espressif32@^6.9.0
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
  ${env.build_flags}
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM=0
# External libraries OnStepX's optional features reference by default.
# Most are gated inside #if blocks, but the Arduino build still needs the
# headers available or the preprocessor chokes.
lib_deps =
  madhephaestus/ESP32Encoder @ ^0.11.8
  plerup/EspSoftwareSerial @ ^8.1.0
  makuna/RTC @ ^2.4.2                        ; DS3231 / DS3234 TLS
  paulstoffregen/Time @ ^1.6                 ; TimeLib.h
  mikalhart/TinyGPSPlus @ ^1.0.3             ; GPS TLS
  teemuatlut/TMCStepper @ ^0.7.3             ; TMC SPI drivers
  paulstoffregen/OneWire @ ^2.3.8            ; DS18B20 etc.
  milesburton/DallasTemperature @ ^3.11.0
  dlloydev/QuickPID @ ^3.1.9                 ; closed-loop PID
  denyssene/SimpleKalmanFilter @ ^0.1.0
  adafruit/Adafruit BME280 Library @ ^2.2.4  ; weather
  adafruit/Adafruit Unified Sensor @ ^1.1.14
# Produces $BUILD_DIR/merged-firmware.bin (bootloader+partitions+boot_app0+app)
# — flash at offset 0x0 for a one-shot install. See merge_bin.py.
extra_scripts = post:merge_bin.py

; -----------------------------------------------------------------------------
; Teensy 4.0
; -----------------------------------------------------------------------------
[env:teensy40]
platform = teensy@^5.0.0
board = teensy40
build_flags =
  ${env.build_flags}
  -D USB_SERIAL

; -----------------------------------------------------------------------------
; Teensy 4.1 — also the MCU behind MaxPCB4
; -----------------------------------------------------------------------------
[env:teensy41]
platform = teensy@^5.0.0
board = teensy41
build_flags =
  ${env.build_flags}
  -D USB_SERIAL

; =============================================================================
;  SmartHandController (SHC) — hjd1964/SmartHandController
;
;  Built when the workflow is dispatched with project=shc. The workflow sets
;  PLATFORMIO_SRC_DIR=SmartHandController for these envs.
; =============================================================================

; -----------------------------------------------------------------------------
; SHC on ESP32 (recommended) — supports WiFi/Bluetooth to mount controller
; -----------------------------------------------------------------------------
[env:shc_esp32]
platform = espressif32@^6.9.0
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
  ${env.build_flags}
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM=0
  -include Arduino.h           ; Force-include so PROGMEM is defined before Ephemeris.hpp expands CONST
lib_deps =
  madhephaestus/ESP32Encoder @ ^0.11.8
  plerup/EspSoftwareSerial @ ^8.1.0
  makuna/RTC @ ^2.4.2
  paulstoffregen/Time @ ^1.6
  paulstoffregen/OneWire @ ^2.3.8
  olikraus/U8g2 @ ^2.35.9
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  https://github.com/MarScaper/ephemeris.git   ; SHC astronomy calculations (not on PIO registry)
# Merged image for one-shot ESP32 flashing (same script as OnStepX env).
extra_scripts = post:merge_bin.py

; -----------------------------------------------------------------------------
; SHC on Teensy 4.0
; -----------------------------------------------------------------------------
[env:shc_teensy40]
platform = teensy@^5.0.0
board = teensy40
build_flags =
  ${env.build_flags}
  -D USB_SERIAL
  -include Arduino.h           ; Force-include so PROGMEM is defined before Ephemeris.hpp expands CONST
lib_deps =
  makuna/RTC @ ^2.4.2
  paulstoffregen/Time @ ^1.6
  paulstoffregen/OneWire @ ^2.3.8
  olikraus/U8g2 @ ^2.35.9
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  https://github.com/MarScaper/ephemeris.git   ; SHC astronomy calculations (not on PIO registry)

; -----------------------------------------------------------------------------
; SHC on Teensy 3.2 (legacy — PlatformIO calls this 'teensy31')
; -----------------------------------------------------------------------------
[env:shc_teensy32]
platform = teensy@^5.0.0
board = teensy31
build_flags =
  ${env.build_flags}
  -D USB_SERIAL
  -include Arduino.h           ; Force-include so PROGMEM is defined before Ephemeris.hpp expands CONST
lib_deps =
  makuna/RTC @ ^2.4.2
  paulstoffregen/Time @ ^1.6
  paulstoffregen/OneWire @ ^2.3.8
  olikraus/U8g2 @ ^2.35.9
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  https://github.com/MarScaper/ephemeris.git   ; SHC astronomy calculations (not on PIO registry)

; =============================================================================
;  SmartWebServer (SWS) — hjd1964/SmartWebServer
;
;  Built when the workflow is dispatched with project=sws. The workflow sets
;  PLATFORMIO_SRC_DIR=SmartWebServer for these envs.
; =============================================================================

; -----------------------------------------------------------------------------
; SWS on ESP32 (most common — has native WiFi + BLE)
; -----------------------------------------------------------------------------
[env:sws_esp32]
platform = espressif32@^6.9.0
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
  ${env.build_flags}
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM=0
lib_deps =
  madhephaestus/ESP32Encoder @ ^0.11.8
  plerup/EspSoftwareSerial @ ^8.1.0
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit Unified Sensor @ ^1.1.14
extra_scripts = post:merge_bin.py

; -----------------------------------------------------------------------------
; SWS on ESP8266 (legacy — still widely deployed)
; -----------------------------------------------------------------------------
[env:sws_esp8266]
platform = espressif8266@^4.2.1
board = esp12e
build_flags =
  ${env.build_flags}
lib_deps =
  plerup/EspSoftwareSerial @ ^8.1.0
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit Unified Sensor @ ^1.1.14

; -----------------------------------------------------------------------------
; STM32F411 BlackPill — also covers MaxSTM3 builds (OnStepX only)
; -----------------------------------------------------------------------------
[env:blackpill_f411]
platform = ststm32@^17.0.0
board = blackpill_f411ce
build_flags =
  ${env.build_flags}
  -D HAL_UART_MODULE_ENABLED
  -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
  -D USBCON
  -D USBD_VID=0x0483
  -D USBD_PID=0x5740
  -D USB_MANUFACTURER="STMicroelectronics"
  -D USB_PRODUCT="\"BLACKPILL_F411CE\""
upload_protocol = dfu
# OnStepX's optional-feature libraries. Most are gated inside #if blocks, but
# the Arduino build still needs the headers resolvable at preprocess time.
# Mirrors the esp32 env minus ESP32-specific libs.
lib_deps =
  makuna/RTC @ ^2.4.2
  paulstoffregen/Time @ ^1.6
  mikalhart/TinyGPSPlus @ ^1.0.3
  teemuatlut/TMCStepper @ ^0.7.3
  paulstoffregen/OneWire @ ^2.3.8
  milesburton/DallasTemperature @ ^3.11.0
  dlloydev/QuickPID @ ^3.1.9
  denyssene/SimpleKalmanFilter @ ^0.1.0
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit Unified Sensor @ ^1.1.14
