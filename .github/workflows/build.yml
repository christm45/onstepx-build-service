name: Build OnStep firmware

# run-name embeds the request_id so the Worker can find this run.
run-name: "onstepx-build req=${{ inputs.request_id }} env=${{ inputs.environment }} project=${{ inputs.project }}"

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Which firmware to build: 'onstepx' (mount controller), 'shc' (SmartHandController), or 'sws' (SmartWebServer)"
        required: false
        default: "onstepx"
      config_h:
        description: "Base64-encoded Config.h contents"
        required: true
      environment:
        description: "PlatformIO env. OnStepX: esp32|teensy40|teensy41|blackpill_f411. SHC: shc_esp32|shc_teensy40|shc_teensy32. SWS: sws_esp32|sws_esp8266."
        required: true
        default: "esp32"
      request_id:
        description: "Client-supplied UUID for correlation"
        required: true
      onstepx_ref:
        description: "Source branch/tag/SHA (default 'main'). Applied to either hjd1964/OnStepX or hjd1964/SmartHandController depending on 'project'."
        required: false
        default: "main"
      plugins:
        description: "Comma-separated OnStepX plugin names to bundle (e.g. 'website,elegantota'). Ignored for SHC/SWS."
        required: false
        default: ""

concurrency:
  group: "onstepx-build-${{ inputs.request_id }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout build service
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          case "${{ inputs.project }}" in
            ""|onstepx|shc|sws) ;;
            *) echo "::error::unsupported project '${{ inputs.project }}'"; exit 1 ;;
          esac
          case "${{ inputs.environment }}" in
            esp32|teensy40|teensy41|blackpill_f411) ;;
            shc_esp32|shc_teensy40|shc_teensy32) ;;
            sws_esp32|sws_esp8266) ;;
            *) echo "::error::unsupported environment '${{ inputs.environment }}'"; exit 1 ;;
          esac
          # request_id must look like a UUID (loose check)
          if ! [[ "${{ inputs.request_id }}" =~ ^[0-9a-fA-F-]{8,64}$ ]]; then
            echo "::error::request_id has invalid format"; exit 1
          fi
          # onstepx_ref: conservative charset — letters/digits and . _ / -
          REF="${{ inputs.onstepx_ref }}"
          if ! [[ "$REF" =~ ^[A-Za-z0-9._/-]{1,64}$ ]]; then
            echo "::error::onstepx_ref '$REF' contains disallowed characters"; exit 1
          fi
          # plugins: conservative charset — letters/digits and commas, ≤200 chars
          PLG="${{ inputs.plugins }}"
          if [ -n "$PLG" ] && ! [[ "$PLG" =~ ^[A-Za-z0-9_,]{1,200}$ ]]; then
            echo "::error::plugins list contains disallowed characters"; exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ inputs.environment }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ inputs.environment }}-

      - name: Fetch upstream source at requested ref
        env:
          ONSTEPX_REF: ${{ inputs.onstepx_ref }}
          PROJECT: ${{ inputs.project }}
        run: |
          set -euo pipefail
          # Pick the upstream repo + local folder based on project.
          PROJECT="${PROJECT:-onstepx}"
          case "$PROJECT" in
            shc)
              REPO="https://github.com/hjd1964/SmartHandController.git"
              LOCAL="SmartHandController"
              ;;
            sws)
              REPO="https://github.com/hjd1964/SmartWebServer.git"
              LOCAL="SmartWebServer"
              ;;
            *)
              REPO="https://github.com/hjd1964/OnStepX.git"
              LOCAL="OnStepX"
              ;;
          esac
          rm -rf OnStepX SmartHandController SmartWebServer
          git clone "$REPO" "$LOCAL"
          cd "$LOCAL"
          echo "::group::Resolving ref '$ONSTEPX_REF'"
          git checkout "$ONSTEPX_REF"
          echo "::notice::Built against $REPO @ $(git rev-parse HEAD) ($ONSTEPX_REF)"
          echo "::notice::Commit date: $(git log -1 --format=%cI HEAD)"
          echo "::endgroup::"
          cd ..
          rm -f "$LOCAL/.gitattributes" "$LOCAL/.gitignore" "$LOCAL/LICENSE" "$LOCAL/README.md" || true

      - name: Bundle OnStepX plugins
        if: ${{ inputs.plugins != '' && (inputs.project == 'onstepx' || inputs.project == '') }}
        env:
          PLUGINS: ${{ inputs.plugins }}
        run: |
          set -euo pipefail
          echo "Bundling plugins: $PLUGINS"
          rm -rf plugins-src
          git clone --depth 1 https://github.com/hjd1964/OnStepX-Plugins.git plugins-src

          # Known plugin → header-file mapping. Extend here when new plugins
          # appear upstream.
          declare -A PLUGIN_HEADERS=(
            [website]="website/Website.h"
            [elegantota]="elegantota/ElegantOTA.h"
            [metrics]="metrics/Metrics.h"
            [serialBluetoothConfig]="serialBluetoothConfig/SerialBluetoothConfig.h"
            [guideRateRheostat]="guideRateRheostat/GuideRateRheostat.h"
            [usb]="usb/Usb.h"
          )

          PCFG="OnStepX/src/plugins/Plugins.config.h"
          mkdir -p OnStepX/src/plugins
          {
            echo "/* User plugins for OnStepX — generated by onstepx-build-service */"
            echo
          } > "$PCFG"

          SLOT=1
          IFS=',' read -ra SELECTED <<< "$PLUGINS"
          for plugin in "${SELECTED[@]}"; do
            plugin=$(echo "$plugin" | xargs)
            [ -z "$plugin" ] && continue
            HEADER="${PLUGIN_HEADERS[$plugin]:-}"
            if [ -z "$HEADER" ]; then
              echo "::error::unknown plugin '$plugin' — allowed: ${!PLUGIN_HEADERS[*]}"; exit 1
            fi
            # Some OnStepX branches (notably E4) already ship the plugin source
            # tree under src/plugins/<name>/. If it's already there, leave it
            # alone — copying a second one on top would produce a nested
            # src/plugins/website/website/ path and break relative #includes.
            if [ -d "OnStepX/src/plugins/$plugin" ]; then
              echo "::notice::Plugin '$plugin' already present in OnStepX source tree (slot $SLOT) — reusing in place"
            elif [ -d "plugins-src/$plugin" ]; then
              echo "::notice::Bundling plugin '$plugin' from OnStepX-Plugins in slot $SLOT"
              cp -r "plugins-src/$plugin" "OnStepX/src/plugins/$plugin"
            else
              echo "::error::plugin directory plugins-src/$plugin missing in OnStepX-Plugins repo AND not in OnStepX source tree"; exit 1
            fi
            {
              echo "#define PLUGIN${SLOT}                   ${plugin}"
              echo "#include \"${HEADER}\""
              echo "#define PLUGIN${SLOT}_COMMAND_PROCESSING    OFF"
              echo
            } >> "$PCFG"
            SLOT=$((SLOT + 1))
            if [ "$SLOT" -gt 8 ]; then
              echo "::error::too many plugins (max 8 slots)"; exit 1
            fi
          done
          # Fill remaining slots with OFF
          while [ "$SLOT" -le 8 ]; do
            {
              echo "#define PLUGIN${SLOT}                       OFF"
              echo "#define PLUGIN${SLOT}_COMMAND_PROCESSING    OFF"
              echo
            } >> "$PCFG"
            SLOT=$((SLOT + 1))
          done
          echo "=== Generated Plugins.config.h ==="
          cat "$PCFG"

      - name: Write user-supplied Config.h
        env:
          CONFIG_B64: ${{ inputs.config_h }}
          PROJECT: ${{ inputs.project }}
        run: |
          set -euo pipefail
          PROJECT="${PROJECT:-onstepx}"
          case "$PROJECT" in
            shc) TARGET="SmartHandController/Config.h" ;;
            sws) TARGET="SmartWebServer/Config.h" ;;
            *)   TARGET="OnStepX/Config.h" ;;
          esac
          echo "$CONFIG_B64" | base64 -d > "$TARGET"
          echo "=== Config.h preview (first 30 lines) ==="
          head -n 30 "$TARGET" || true
          wc -c "$TARGET"

      - name: PlatformIO build
        id: build
        env:
          PROJECT: ${{ inputs.project }}
        run: |
          set -euo pipefail
          # PlatformIO's src_dir default is OnStepX (set in platformio.ini).
          # For SHC/SWS builds, point it at the right folder via env override.
          case "${PROJECT:-onstepx}" in
            shc) export PLATFORMIO_SRC_DIR=SmartHandController ;;
            sws) export PLATFORMIO_SRC_DIR=SmartWebServer ;;
          esac
          # Tee pio output to build.log so the collect step can scrape the
          # RAM:/Flash: size lines for the manifest.
          pio run -e ${{ inputs.environment }} 2>&1 | tee build.log

      - name: Collect firmware artifacts
        id: collect
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          OUT="dist"
          mkdir -p "$OUT"
          BUILD_DIR=".pio/build/$ENV"

          case "$ENV" in
            esp32|shc_esp32|sws_esp32)
              cp "$BUILD_DIR/firmware.bin" "$OUT/firmware.bin"
              cp "$BUILD_DIR/bootloader.bin" "$OUT/bootloader.bin"
              cp "$BUILD_DIR/partitions.bin" "$OUT/partitions.bin"
              # boot_app0.bin lives in the framework package; esptool-js needs it at 0xe000
              BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32 -name boot_app0.bin | head -n 1)
              if [ -n "$BOOT_APP0" ]; then cp "$BOOT_APP0" "$OUT/boot_app0.bin"; fi
              # merge_bin.py post-script produces this — flash as one file at 0x0.
              if [ -f "$BUILD_DIR/merged-firmware.bin" ]; then
                cp "$BUILD_DIR/merged-firmware.bin" "$OUT/merged-firmware.bin"
              fi
              ;;
            teensy40|teensy41|shc_teensy40|shc_teensy32)
              cp "$BUILD_DIR/firmware.hex" "$OUT/firmware.hex"
              ;;
            sws_esp8266)
              cp "$BUILD_DIR/firmware.bin" "$OUT/firmware.bin"
              ;;
            blackpill_f411)
              cp "$BUILD_DIR/firmware.bin" "$OUT/firmware.bin"
              ;;
          esac

          # Scrape RAM/Flash usage from the PlatformIO build log so the
          # frontend can show a size bar after compile. Lines look like:
          #   RAM:   [=         ]  10.8% (used 35380 bytes from 327680 bytes)
          #   Flash: [==        ]  15.2% (used 477813 bytes from 3145728 bytes)
          RAM_LINE=$(grep -E '^RAM:' build.log | tail -1 || true)
          FLASH_LINE=$(grep -E '^Flash:' build.log | tail -1 || true)
          extract() { # $1: "RAM"|"Flash"; $2: "used"|"total"
            echo "$3" | sed -nE "s/.*\(used ([0-9]+) bytes from ([0-9]+) bytes\).*/\1 \2/p" | awk -v W="$2" '{print (W=="used"?$1:$2)}'
          }
          RAM_USED=$(echo "$RAM_LINE" | sed -nE 's/.*\(used ([0-9]+) bytes.*/\1/p')
          RAM_TOTAL=$(echo "$RAM_LINE" | sed -nE 's/.*from ([0-9]+) bytes\).*/\1/p')
          FLASH_USED=$(echo "$FLASH_LINE" | sed -nE 's/.*\(used ([0-9]+) bytes.*/\1/p')
          FLASH_TOTAL=$(echo "$FLASH_LINE" | sed -nE 's/.*from ([0-9]+) bytes\).*/\1/p')

          cat > "$OUT/manifest.json" <<EOF
          {
            "request_id": "${{ inputs.request_id }}",
            "environment": "$ENV",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "ram_used": ${RAM_USED:-null},
            "ram_total": ${RAM_TOTAL:-null},
            "flash_used": ${FLASH_USED:-null},
            "flash_total": ${FLASH_TOTAL:-null},
            "files": $(ls "$OUT" | grep -v manifest.json | jq -R . | jq -s .)
          }
          EOF
          echo "=== manifest ==="
          cat "$OUT/manifest.json"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          # Name includes request_id so Worker can match even if it can't enumerate by run id.
          name: firmware-${{ inputs.request_id }}
          path: dist/
          retention-days: 1
          if-no-files-found: error
